# PinPoint — Nginx (sites-available)
# Copiar: sudo nano /etc/nginx/sites-available/default
# Testar: sudo nginx -t && sudo systemctl reload nginx
#
# Laravel postos .env:
#   APP_URL=https://postos.pinpointech.com
#   FORCE_HTTPS=true
#   L5_SWAGGER_USE_ABSOLUTE_PATH=false

server {
    listen 80;
    listen [::]:80;
    server_name postos.pinpointech.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name users.pinpointech.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name postos.pinpointech.com;

    ssl_certificate /etc/letsencrypt/live/postos.pinpointech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/postos.pinpointech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    access_log /var/log/nginx/postos.pinpointech.com.access.log;
    error_log  /var/log/nginx/postos.pinpointech.com.error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name users.pinpointech.com;

    ssl_certificate /etc/letsencrypt/live/postos.pinpointech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/postos.pinpointech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    access_log /var/log/nginx/users.pinpointech.com.access.log;
    error_log  /var/log/nginx/users.pinpointech.com.error.log;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
